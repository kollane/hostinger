# Application ServiceAccount
# Reference solution for Exercise 2
#
# Dedicated ServiceAccount for user-service application
# Follows principle of least privilege

---
# =======================================================================
# ServiceAccount for user-service
# =======================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: production
  labels:
    app: user-service
    tier: backend
  annotations:
    description: "ServiceAccount for user-service backend"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "user-service"
automountServiceAccountToken: true

---
# =======================================================================
# Role for user-service
# =======================================================================
# Minimal permissions - only what the app needs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service-app
  namespace: production
  labels:
    app: user-service
    role-type: application
rules:
  # =======================================================================
  # ConfigMaps (Read-Only)
  # =======================================================================
  # Allow reading application configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # =======================================================================
  # Secrets (Minimal - for Vault token only)
  # =======================================================================
  # Required for Vault Agent to authenticate
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["user-service-vault-token"]

  # =======================================================================
  # Service Discovery
  # =======================================================================
  # Allow discovering other services (optional)
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

  # =======================================================================
  # NO OTHER PERMISSIONS
  # =======================================================================
  # Application doesn't need:
  # - Pod management
  # - Deployment management
  # - Secret creation
  # - Node access

---
# =======================================================================
# RoleBinding for user-service
# =======================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-app-binding
  namespace: production
  labels:
    app: user-service
subjects:
  - kind: ServiceAccount
    name: user-service
    namespace: production
roleRef:
  kind: Role
  name: user-service-app
  apiGroup: rbac.authorization.k8s.io

