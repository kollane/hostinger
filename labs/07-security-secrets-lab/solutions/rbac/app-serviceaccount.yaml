---
# =======================================================================
# ServiceAccount for frontend (Example)
# =======================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: production
  labels:
    app: frontend
    tier: frontend
  annotations:
    description: "ServiceAccount for frontend application"
automountServiceAccountToken: true

---
# =======================================================================
# Role for frontend
# =======================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-app
  namespace: production
  labels:
    app: frontend
    role-type: application
rules:
  # ConfigMaps (Read-Only)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

  # Service Discovery (to find backend services)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]

---
# =======================================================================
# RoleBinding for frontend
# =======================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-app-binding
  namespace: production
  labels:
    app: frontend
subjects:
  - kind: ServiceAccount
    name: frontend
    namespace: production
roleRef:
  kind: Role
  name: frontend-app
  apiGroup: rbac.authorization.k8s.io

---
# =======================================================================
# USAGE NOTES
# =======================================================================
#
# Apply:
# kubectl apply -f app-serviceaccount.yaml
#
# Verify ServiceAccounts:
# kubectl get serviceaccounts -n production
#
# Test permissions:
# kubectl auth can-i get configmaps --as=system:serviceaccount:production:user-service -n production
# kubectl auth can-i delete pods --as=system:serviceaccount:production:user-service -n production
# kubectl auth can-i get secrets --as=system:serviceaccount:production:user-service -n production
#
# Expected results:
# - get configmaps: yes
# - delete pods: no
# - get secrets: no (except specific Vault token)
#
# Use in Deployment:
# spec:
#   serviceAccountName: user-service
#   containers:
#     - name: user-service
#       image: user-service:latest
#
# Security Best Practices:
# ✅ One ServiceAccount per application
# ✅ Minimal permissions (least privilege)
# ✅ No cluster-admin
# ✅ No wildcard permissions
# ✅ Namespace-scoped roles only
# ✅ Document permissions in annotations
#
# Verify bindings:
# kubectl describe rolebinding user-service-app-binding -n production
#
# Audit ServiceAccount usage:
# kubectl get pods -n production -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.serviceAccountName}{"\n"}{end}'
#
# Check for default ServiceAccount usage (BAD):
# kubectl get pods -n production -o json | jq -r '.items[] | select(.spec.serviceAccountName=="default") | .metadata.name'
#
# =======================================================================
