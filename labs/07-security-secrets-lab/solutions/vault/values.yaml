# Vault Helm Chart Values
# Reference solution for Exercise 1
# Version: Vault 1.15+

# =============================================================================
# DEVELOPMENT MODE (Lab Environment)
# =============================================================================
# WARNING: DO NOT USE IN PRODUCTION!
# Dev mode features:
# - Auto-unseal (no manual unseal required)
# - In-memory storage (data lost on restart)
# - Single replica
# - Root token = "root"
# =============================================================================

server:
  # Dev mode configuration
  dev:
    enabled: true  # ⚠️ DISABLE IN PRODUCTION!
    devRootToken: "root"  # Default root token for dev mode

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Standalone mode (not HA)
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

  # Service configuration
  service:
    enabled: true
    type: ClusterIP
    port: 8200
    targetPort: 8200
    annotations: {}

  # Data storage (disabled in dev mode)
  dataStorage:
    enabled: false
    size: 10Gi
    storageClass: null
    accessMode: ReadWriteOnce

  # Audit storage (disabled in dev mode)
  auditStorage:
    enabled: false

# =============================================================================
# Vault Agent Injector
# =============================================================================
# Enables sidecar injection for secrets

injector:
  enabled: true

  # Replicas
  replicas: 1

  # Resources
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # Webhook configuration
  port: 8080

  # Failure policy
  failurePolicy: Ignore

  # Namespace selector (inject in all namespaces)
  namespaceSelector: {}

# =============================================================================
# Vault UI
# =============================================================================

ui:
  enabled: true
  serviceType: ClusterIP
  serviceNodePort: null
  externalPort: 8200

# =============================================================================
# Global settings
# =============================================================================

global:
  enabled: true

  # TLS (disabled for lab)
  tlsDisable: true  # ⚠️ ENABLE IN PRODUCTION!

  # Namespace
  namespace: "vault"

