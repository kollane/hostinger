# GitHub Actions Workflow: Security Scanning
# Reference solution for Exercise 4
#
# Scans Docker images and Kubernetes manifests for vulnerabilities
# Integrates with GitHub Security tab (SARIF reports)
# Fails build if Critical vulnerabilities found

name: Security Scan

on:
  # Run on every push to main/master
  push:
    branches:
      - main
      - master

  # Run on every pull request
  pull_request:
    branches:
      - main
      - master

  # Allow manual trigger
  workflow_dispatch:

  # Schedule daily scans
  schedule:
    # Every day at 2 AM UTC
    - cron: '0 2 * * *'

# Permissions for GitHub Security tab
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ==========================================================================
  # Job 1: Scan Docker Images
  # ==========================================================================
  scan-docker-images:
    name: Scan Docker Images
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Build Docker image
      - name: Build user-service image
        run: |
          cd labs/apps/backend-nodejs
          docker build -t user-service:${{ github.sha }} .
          docker tag user-service:${{ github.sha }} user-service:latest

      # Run Trivy vulnerability scanner (Table output)
      - name: Run Trivy scanner (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'user-service:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # Run Trivy vulnerability scanner (SARIF output for GitHub Security)
      - name: Run Trivy scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'user-service:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      # Upload SARIF report to GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Upload even if previous step fails
        with:
          sarif_file: 'trivy-results.sarif'

      # Fail build if Critical vulnerabilities found
      - name: Fail on Critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'user-service:latest'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'  # Fail build if found

  # ==========================================================================
  # Job 2: Scan Kubernetes Manifests
  # ==========================================================================
  scan-k8s-manifests:
    name: Scan Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Run Trivy config scanner (Table output)
      - name: Run Trivy config scan (Table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'labs/03-kubernetes-basics-lab'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # Run Trivy config scanner (SARIF output)
      - name: Run Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'labs/03-kubernetes-basics-lab'
          format: 'sarif'
          output: 'trivy-k8s-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      # Upload SARIF report to GitHub Security tab
      - name: Upload Trivy K8s results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-k8s-results.sarif'

      # Fail build if misconfigurations found
      - name: Fail on misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'labs/03-kubernetes-basics-lab'
          format: 'table'
          severity: 'HIGH'
          exit-code: '1'

  # ==========================================================================
  # Job 3: Scan Filesystem (Dependencies)
  # ==========================================================================
  scan-dependencies:
    name: Scan Dependencies
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Run Trivy filesystem scanner
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'labs/apps/backend-nodejs'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      # Upload SARIF report
      - name: Upload Trivy FS results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

  # ==========================================================================
  # Job 4: Security Summary
  # ==========================================================================
  security-summary:
    name: Generate Security Summary
    runs-on: ubuntu-latest
    needs: [scan-docker-images, scan-k8s-manifests, scan-dependencies]
    if: always()  # Run even if previous jobs fail

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Images: ${{ needs.scan-docker-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Kubernetes Manifests: ${{ needs.scan-k8s-manifests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies: ${{ needs.scan-dependencies.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# USAGE NOTES
# =============================================================================
#
# Setup:
# 1. Copy this file to .github/workflows/security-scan.yml
# 2. Commit and push to GitHub
# 3. Workflow runs automatically on push/PR
#
# View results:
# - Actions tab: See workflow runs
# - Security tab → Code scanning alerts: See SARIF reports
#
# Manual trigger:
# - Actions tab → Security Scan → Run workflow
#
# Configure alerts:
# - Settings → Security & analysis → Enable "Code scanning"
# - Configure notifications in Settings → Notifications
#
# Customize severity:
# - Change severity: CRITICAL,HIGH,MEDIUM,LOW
# - Change exit-code: 0 (don't fail) or 1 (fail build)
#
# Scan additional images:
# - Add more steps with different image-ref
# - Use matrix strategy for multiple images
#
# Integration with Slack/Teams:
# - Add notification step using slack-action or teams-webhook
# - Example:
#   - name: Notify Slack
#     if: failure()
#     uses: slackapi/slack-github-action@v1
#     with:
#       webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
#       payload: '{"text":"Security scan failed!"}'
#
# Troubleshooting:
# - Job fails with "permission denied" → Check repository settings
# - SARIF upload fails → Check permissions in workflow
# - No vulnerabilities shown → Check GitHub Security tab settings
#
# Best Practices:
# ✅ Scan on every commit (push/PR)
# ✅ Upload SARIF reports to GitHub Security tab
# ✅ Fail build on Critical vulnerabilities
# ✅ Schedule daily scans for drift detection
# ✅ Notify team on failures (Slack/Teams)
# ✅ Regular Trivy database updates (automatic in GitHub Actions)
#
# =============================================================================
