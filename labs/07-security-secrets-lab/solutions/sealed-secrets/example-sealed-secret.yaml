# Example Sealed Secret
# Reference solution for Exercise 5
#
# This is an EXAMPLE of what a SealedSecret looks like after encryption
# The actual encrypted data is cluster-specific and cannot be reused

---
# =============================================================================
# Original Secret (DO NOT commit this to Git!)
# =============================================================================
# This is what you start with (created with --dry-run)
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: db-password
#   namespace: production
# type: Opaque
# data:
#   password: U3VwZXJTZWNyZXREQlBhc3N3b3JkMTIz  # Base64: SuperSecretDBPassword123
#   username: cG9zdGdyZXM=  # Base64: postgres

---
# =============================================================================
# Sealed Secret (SAFE to commit to Git!)
# =============================================================================
# After running: kubeseal < secret.yaml > sealed-secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-password
  namespace: production
  labels:
    app: user-service
    tier: backend
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
    sealedsecrets.bitnami.com/namespace-wide: "false"
spec:
  # Encrypted data (cluster-specific, public key encrypted)
  # ⚠️ These values are EXAMPLES - they won't work in your cluster!
  # You must generate your own sealed secrets using kubeseal
  encryptedData:
    # This is what "SuperSecretDBPassword123" looks like encrypted
    # The actual value is cluster-specific and changes every time
    password: >-
      AgBj8GHqvK8F5VsZxP9L2mRdQwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwAqWeRtYuIoPlKmNhBgVcXdZeS
      wErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJ
      hGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtY
      uIoPlKmNhBgVcXdZeS

    # This is what "postgres" looks like encrypted
    username: >-
      AgA3KjF2dP1qWsXcVbNmAsZxQwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoP
      lKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeS

  # Template for the created Secret (optional)
  template:
    metadata:
      name: db-password
      namespace: production
      labels:
        app: user-service
    type: Opaque

---
# =============================================================================
# Another Example: JWT Secret
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: jwt-secret
  namespace: production
  labels:
    app: user-service
spec:
  encryptedData:
    # Example encrypted JWT secret
    secret: >-
      AgC9HmLpWqKsXvNbYcZdReQwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoP
      lKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeSwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcX
      dZeSwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeS

    expiresIn: AgB5TnPqRsKxWvMcYbZeRfQwErTyUiOpLkJhGfDsAqWeRtYuIoPlKmNhBgVcXdZeS

  template:
    metadata:
      name: jwt-secret
      namespace: production
    type: Opaque

---
# =============================================================================
# IMPORTANT NOTES
# =============================================================================
#
# ⚠️ The encrypted values above are EXAMPLES and will NOT work!
# ⚠️ Each cluster has a unique public/private key pair
# ⚠️ Sealed secrets are cluster-specific and cannot be shared
#
# How to create your own sealed secret:
#
# 1. Create normal secret (dry-run):
#    kubectl create secret generic db-password \
#      --from-literal=password=SuperSecretDBPassword123 \
#      --from-literal=username=postgres \
#      --namespace=production \
#      --dry-run=client -o yaml > secret.yaml
#
# 2. Seal it:
#    kubeseal < secret.yaml > sealed-secret.yaml
#
# 3. Delete original secret file (contains plain text):
#    rm secret.yaml
#
# 4. Commit sealed secret to Git (SAFE!):
#    git add sealed-secret.yaml
#    git commit -m "Add database password (sealed)"
#    git push
#
# 5. Apply to cluster:
#    kubectl apply -f sealed-secret.yaml
#
# 6. Controller decrypts and creates normal Secret:
#    kubectl get secret db-password -n production
#
# Verify:
# kubectl get sealedsecret -n production
# kubectl get secret -n production
# kubectl get secret db-password -n production -o yaml
#
# Decode secret (to verify it was created correctly):
# kubectl get secret db-password -n production -o jsonpath='{.data.password}' | base64 -d
#
# =============================================================================
# SCOPE TYPES
# =============================================================================
#
# Sealed Secrets supports 3 scope types:
#
# 1. Strict (default):
#    - Sealed to specific namespace AND name
#    - Most secure
#    - Cannot rename or move to different namespace
#    - Annotation: sealedsecrets.bitnami.com/cluster-wide: "false"
#                  sealedsecrets.bitnami.com/namespace-wide: "false"
#
# 2. Namespace-wide:
#    - Sealed to specific namespace only
#    - Can rename within same namespace
#    - Annotation: sealedsecrets.bitnami.com/namespace-wide: "true"
#
# 3. Cluster-wide:
#    - Can be used in any namespace with any name
#    - Least secure (but most flexible)
#    - Annotation: sealedsecrets.bitnami.com/cluster-wide: "true"
#
# Example (namespace-wide):
# kubeseal --scope namespace-wide < secret.yaml > sealed-secret.yaml
#
# Example (cluster-wide):
# kubeseal --scope cluster-wide < secret.yaml > sealed-secret.yaml
#
# =============================================================================
# BACKUP AND DISASTER RECOVERY
# =============================================================================
#
# CRITICAL: Backup the controller's private key!
#
# Export private key:
# kubectl get secret -n kube-system sealed-secrets-key -o yaml > sealed-secrets-key-backup.yaml
#
# Store securely:
# - Encrypted backup (GPG, age, Vault)
# - Multiple locations (S3, 1Password, offline)
# - Access control (only admins)
#
# Restore to new cluster:
# kubectl apply -f sealed-secrets-key-backup.yaml
# kubectl rollout restart deployment -n kube-system sealed-secrets-controller
#
# Without the private key:
# - ❌ Cannot decrypt sealed secrets
# - ❌ Must re-seal all secrets with new key
# - ❌ GitOps workflow broken
#
# =============================================================================
# ROTATION
# =============================================================================
#
# Rotate secret value:
# 1. Create new secret with new value
# 2. Seal it: kubeseal < new-secret.yaml > sealed-secret.yaml
# 3. Commit to Git
# 4. Apply: kubectl apply -f sealed-secret.yaml
# 5. Restart pods to pick up new secret
#
# Rotate encryption key (advanced):
# 1. Generate new key: kubectl -n kube-system create secret ...
# 2. Sealed Secrets Controller automatically uses latest key for new secrets
# 3. Old secrets still work (controller keeps old keys)
# 4. Re-seal all secrets with new key (optional, for forward secrecy)
#
# =============================================================================
# TROUBLESHOOTING
# =============================================================================
#
# SealedSecret created but no Secret appears:
# - Check controller logs: kubectl logs -n kube-system -l name=sealed-secrets-controller
# - Check SealedSecret events: kubectl describe sealedsecret db-password -n production
#
# "no key could decrypt secret" error:
# - SealedSecret created in different cluster
# - Private key was rotated/lost
# - Wrong scope (namespace/name mismatch)
#
# Cannot seal secret (kubeseal fails):
# - Controller not running: kubectl get pods -n kube-system -l name=sealed-secrets-controller
# - Cannot fetch certificate: kubeseal --fetch-cert
# - Network issue: Check cluster connectivity
#
# =============================================================================
